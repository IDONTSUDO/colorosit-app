    <title>Colorist App</title>
    <script type="module" crossorigin src="/assets/index-D47erIA4.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BvWi8aaE.css">
  <link rel="manifest" href="/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/registerSW.js"></script></head>
  <body>
    <div id="root"></div>
    <style>
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }

      ::-webkit-scrollbar-track {
        background-color: rgb(255, 255, 255);
      }

      ::-webkit-scrollbar-thumb {
        background-color: rgb(0, 0, 0);
      }
      .icon {
        font-family: "tabler-icons" !important;
        font-style: normal;
        font-weight: normal;
        font-variant: normal;
        text-transform: none;
        line-height: 1;
      }
      .icon:before {
        content: "\ea19";
      }
      .app {
        margin: 0 auto;
        background: var(--bg);
        border-radius: var(--radius-lg);
        border: 0.5px solid var(--border);
        overflow: hidden;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 20px;
        border-bottom: 0.5px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--bg);
        /* z-index: 10; */
      }
      .back-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: var(--radius);
        border: 0.5px solid var(--border-hover);
        background: transparent;
        cursor: pointer;
        color: var(--text);
        transition: background 0.15s;
        font-size: 16px;
      }
      :root {
        --bg: #ffffff;
        --bg-secondary: #f7f7f5;
        --bg-danger: #fff0f0;
        --text: #1a1a1a;
        --text-secondary: #6b6b68;
        --border: rgba(0, 0, 0, 0.12);
        --border-hover: rgba(0, 0, 0, 0.25);
        --border-focus: rgba(0, 0, 0, 0.4);
        --danger: #c0392b;
        --radius: 8px;
        --radius-lg: 12px;
      }
    </style>
  </body>
</html>
